[org/gnome/control-center]
#dconf dump / > gnome.ini to get file
#dconf load / < gnome.ini to set up


[org/gnome/desktop/a11y/applications]
screen-keyboard-enabled=false

[org/gnome/desktop/app-folders]
folder-children=['System', 'Utilities', 'YaST', 'Pardus']

[org/gnome/desktop/app-folders/folders/Pardus]
categories=['X-Pardus-Apps']
name='X-Pardus-Apps.directory'
translate=true

[org/gnome/desktop/app-folders/folders/System]
apps=['org.gnome.baobab.desktop', 'org.gnome.DiskUtility.desktop', 'org.gnome.Logs.desktop', 'org.freedesktop.MalcontentControl.desktop', 'org.gnome.Sysprof.desktop', 'org.gnome.SystemMonitor.desktop', 'org.gnome.tweaks.desktop']
name='X-GNOME-Shell-System.directory'
translate=true

[org/gnome/desktop/app-folders/folders/Utilities]
apps=['org.gnome.Decibels.desktop', 'org.gnome.Connections.desktop', 'org.gnome.Papers.desktop', 'org.gnome.FileRoller.desktop', 'org.gnome.font-viewer.desktop', 'org.gnome.Loupe.desktop']
name='X-GNOME-Shell-Utilities.directory'
translate=true

[org/gnome/desktop/app-folders/folders/YaST]
categories=['X-SuSE-YaST']
name='suse-yast.directory'
translate=true

[org/gnome/desktop/datetime]
automatic-timezone=true

[org/gnome/desktop/input-sources]
sources=[('xkb', 'us')]

[org/gnome/desktop/interface]
clock-show-seconds=true
clock-show-weekday=true
color-scheme='prefer-dark'
toolkit-accessibility=false

[org/gnome/desktop/notifications]
application-children=['org-gnome-software']

[org/gnome/desktop/notifications/application/org-gnome-software]
application-id='org.gnome.Software.desktop'

[org/gnome/desktop/wm/keybindings]
begin-move=['<Super>F7']
begin-resize=['<Super>F8']
maximize=@as []
minimize=['<Super>Down']
move-to-monitor-down=@as []
move-to-monitor-left=@as []
move-to-monitor-right=@as []
move-to-monitor-up=@as []
move-to-workspace-left=['<Shift><Super>h']
move-to-workspace-right=['<Shift><Super>l']
panel-run-dialog=['<Super>r']
toggle-fullscreen=['<Super>f']
toggle-maximized=['<Super>F12']
unmaximize=@as []

[org/gnome/epiphany/state]
is-maximized=false
window-size=(1024, 736)

[org/gnome/epiphany/web]
auto-open-schemes=[('https://extensions.gnome.org', 'gnome-extensions')]

[org/gnome/mutter/keybindings]
toggle-tiled-left=['<Super>h']
toggle-tiled-right=['<Super>l']

[org/gnome/nautilus/preferences]
migrated-gtk-settings=true

[org/gnome/settings-daemon/plugins/media-keys]
custom-keybindings=['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0/','/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1/','/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2/']
home=['<Super>e']
logout=['<Control><Super>Delete']
on-screen-keyboard=@as []
reboot=['<Control><Super>Home']
screensaver=['<Control><Super>BackSpace']
search=['<Super>slash']
#shutdown=['<Control><Super>End']

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom0]
binding='<Super>t'
command='kitty'
name='Kitty'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom1]
binding='<Super>w'
command='firefox'
name='Browser'

[org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/custom2]
binding='<Control><Super>End'
command='systemctl poweroff'
name='poweroff'

[org/gnome/shell]
enabled-extensions=['Vitals@CoreCoding.com', 'dash-to-dock@micxgx.gmail.com']
last-selected-power-profile='power-saver'
welcome-dialog-last-shown-version='50.3'

[org/gnome/shell/extensions/dash-to-dock]
apply-custom-theme=false
background-opacity=0.80000000000000004
custom-background-color=false
custom-theme-shrink=true
customize-alphas=true
dash-max-icon-size=37
disable-overview-on-startup=true
dock-position='BOTTOM'
height-fraction=0.90000000000000002
max-alpha=0.80000000000000004
min-alpha=0.029999999999999999
preferred-monitor=-2
preferred-monitor-by-connector='eDP-1'
show-mounts=false
show-show-apps-button=false
show-trash=false
transparency-mode='DYNAMIC'

[org/gnome/shell/extensions/vitals]
hide-icons=false
icon-style=0
menu-centered=false
show-battery=false
show-fan=false
show-storage=false
show-voltage=true
update-time=1

[org/gnome/shell/keybindings]
screenshot=['Print']
show-screenshot-ui=['<Shift><Super>Print']

[org/gnome/shell/world-clocks]
locations=@av []

[org/gnome/software]
check-timestamp=int64 1783243684
first-run=false

[org/gtk/gtk4/settings/file-chooser]
show-hidden=false
sort-directories-first=false
